function submitAll(){  
  
let correct=0;  
let wrong=0;  
let blank=0;  
let total=qIndex;  
  
let resultBoxes=document.querySelectorAll(".result");  
  
for(let i=0;i<qIndex;i++){

let radios=document.getElementsByName("q"+i);
let chosen=null;

let box=document.getElementById("q"+i);
let correctValue=box.dataset.correct;

let correctText="";
let chosenText="";

for(let j=0;j<radios.length;j++){

let r=radios[j];
let label=r.parentElement;

if(r.value==correctValue){
correctText=label.innerText;
label.classList.add("correct");
}

if(r.checked){
chosen=r;
chosenText=label.innerText;
}

}

if(!chosen){

blank++;

resultBoxes[i].innerHTML=
"Bạn chọn: <span style='color:red;font-weight:bold'>Chưa chọn ❌</span> - Đáp án: <span style='color:green;font-weight:bold'>"+correctText+"</span>";

}

else if(chosen.value==correctValue){

correct++;

resultBoxes[i].innerHTML=
"Bạn chọn: <span style='color:green;font-weight:bold'>"+chosenText+" ✔</span>";

}

else{

wrong++;

chosen.parentElement.classList.add("wrong");

resultBoxes[i].innerHTML=
"Bạn chọn: <span style='color:red;font-weight:bold'>"+chosenText+" ❌</span> - Đáp án: <span style='color:green;font-weight:bold'>"+correctText+"</span>";

}

}
  
let percent=Math.round((correct/total)*100);  
  
document.getElementById("popupScore").innerHTML =  
correct+" / "+total;  
  
document.getElementById("popupDetail").innerHTML =  
"✅ Đúng: "+correct+  
" | ❌ Sai: "+wrong+  
" | ⚪ Chưa làm: "+blank;  
  
document.getElementById("popupPercent").innerHTML =  
percent+"% chính xác";  
  
document.getElementById("scorePopup").style.display="flex";  
  
document.getElementById("result").innerHTML =  
"🏆 Điểm: "+correct+" / "+total;  
  
document.getElementById("result").style.display="block";  
  
document.getElementById("redoBtn").style.display="block";  
document.getElementById("checkBtn").style.display="none";  
  
document.getElementById("popupBarFill").style.width =  
percent+"%";  
  
}
